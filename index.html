<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0, minimum-scale=1.0">
    <title>Фуд-Ран | Неоновый забег</title>
    <style>
        :root {
            --bg: #0a0a1a;
            --neon-green: #2ecc71;
            --neon-red: #e74c3c;
            --gold: #f1c40f;
            --text: #ecf0f1;
            --card: #1e1e35;
            --radius: 22px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            background: #050510;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
            position: fixed;
            inset: 0;
            touch-action: manipulation;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #app {
            width: 100%;
            height: 100%;
            max-width: 500px;
            position: relative;
            overflow: hidden;
            background: #0a0a1a;
        }
        .screen {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            opacity: 0;
            transform: scale(0.94);
            transition: opacity 0.35s ease, transform 0.35s ease;
            z-index: 1;
        }
        .screen.active {
            pointer-events: all;
            opacity: 1;
            transform: scale(1);
            z-index: 10;
        }
        #menu-screen {
            gap: 16px;
            padding: 30px 20px;
            background: radial-gradient(ellipse at 50% 30%, #1a1a40 0%, #0a0a1a 70%);
        }
        #menu-screen .logo {
            font-size: 64px;
            animation: logoBounce 2.2s ease-in-out infinite;
        }
        @keyframes logoBounce {
            0%,
            100% {
                transform: translateY(0);
            }
            25% {
                transform: translateY(-18px);
            }
            50% {
                transform: translateY(0);
            }
            70% {
                transform: translateY(-8px);
            }
        }
        #menu-screen h1 {
            font-size: 30px;
            font-weight: 900;
            color: #fff;
            letter-spacing: 1px;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.15);
        }
        #menu-screen h1 span {
            background: linear-gradient(135deg, #f1c40f, #e67e22);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        #menu-screen .subtitle {
            font-size: 13px;
            color: #889;
            letter-spacing: 0.4px;
            margin-top: -8px;
        }
        .btn {
            width: 100%;
            max-width: 280px;
            padding: 15px 26px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: all 0.25s ease;
            color: #fff;
            text-align: center;
            box-shadow: 0 6px 22px rgba(0, 0, 0, 0.35);
        }
        .btn:active {
            transform: scale(0.93);
        }
        .btn-play {
            background: linear-gradient(135deg, #2ecc71, #1abc9c);
            font-size: 19px;
            padding: 17px 30px;
            box-shadow: 0 8px 30px rgba(46, 204, 113, 0.4);
        }
        .btn-collection {
            background: linear-gradient(135deg, #3498db, #2980b9);
        }
        .btn-stats {
            background: rgba(255, 255, 255, 0.07);
            border: 2px solid rgba(255, 255, 255, 0.18);
            font-size: 13px;
            padding: 11px 20px;
            font-weight: 500;
        }
        .stats-row {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 280px;
        }
        .stats-row .btn {
            flex: 1;
            font-size: 12px;
            padding: 10px 8px;
        }
        .social-links {
            display: flex;
            gap: 14px;
            margin-top: 6px;
        }
        .social-links a {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .social-links a:active {
            background: rgba(255, 255, 255, 0.2);
        }
        #game-screen {
            background: #000;
        }
        #game-canvas {
            position: absolute;
            inset: 0;
            z-index: 1;
        }
        #game-hud {
            position: absolute;
            top: 6%;
            left: 0;
            right: 0;
            z-index: 15;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            pointer-events: none;
            padding: 0 20px;
        }
        .hud-top-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
            font-size: 24px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
            letter-spacing: 1px;
        }
        .hud-lives-row {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 28px;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 8px 28px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .hud-lives-row .heart {
            transition: all 0.3s ease;
        }
        .hud-lives-row .heart.lost {
            opacity: 0.2;
            transform: scale(0.65);
            filter: grayscale(1);
        }
        #hud-pause-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            transition: all 0.2s ease;
        }
        #hud-pause-btn:active {
            background: rgba(255, 255, 255, 0.2);
        }
        #pause-overlay,
        #gameover-overlay {
            position: absolute;
            inset: 0;
            z-index: 50;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        #pause-overlay.visible,
        #gameover-overlay.visible {
            pointer-events: all;
            opacity: 1;
        }
        .pause-card,
        .go-card {
            background: #1e1e35;
            border-radius: 24px;
            padding: 28px 22px;
            text-align: center;
            width: 85%;
            max-width: 340px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.15);
            animation: popIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            from {
                transform: translateY(30px) scale(0.85);
                opacity: 0;
            }
            to {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }
        .pause-card h3,
        .go-title {
            font-size: 22px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 10px;
        }
        .go-emoji {
            font-size: 56px;
        }
        .go-score {
            font-size: 44px;
            font-weight: 900;
            color: #f1c40f;
        }
        .go-record {
            font-size: 14px;
            color: #aab;
            margin-bottom: 14px;
        }
        .go-record.new-record {
            color: #ffe484;
            font-weight: 800;
        }
        .go-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .go-btn {
            padding: 13px 22px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            letter-spacing: 0.3px;
            color: #fff;
            transition: all 0.2s ease;
        }
        .go-btn:active {
            transform: scale(0.9);
        }
        .go-btn-retry {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
        }
        .go-btn-menu {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        #collection-screen {
            padding: 20px 14px;
            gap: 14px;
            overflow-y: auto;
            justify-content: flex-start;
            background: #0d0d1f;
        }
        #collection-screen h2 {
            color: #fff;
            font-size: 22px;
            font-weight: 800;
            text-align: center;
            margin-top: 8px;
        }
        .collection-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
            gap: 10px;
            width: 100%;
            max-width: 380px;
            padding-bottom: 16px;
        }
        .collection-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            padding: 12px 6px;
            text-align: center;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        .collection-card:active {
            background: rgba(255, 255, 255, 0.16);
            transform: scale(0.93);
        }
        .card-emoji {
            font-size: 34px;
            line-height: 1;
        }
        .card-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .card-dot.healthy {
            background: #2ecc71;
        }
        .card-dot.harmful {
            background: #e74c3c;
        }
        .card-name {
            font-size: 11px;
            color: #ccd;
            font-weight: 600;
        }
        #collection-detail {
            display: none;
            text-align: center;
            color: #fff;
        }
        .detail-emoji {
            font-size: 64px;
        }
        .detail-name {
            font-size: 22px;
            font-weight: 800;
            margin: 6px 0;
        }
        .detail-info {
            font-size: 14px;
            color: #ccd;
            line-height: 1.5;
            max-width: 300px;
        }
        .detail-type {
            font-size: 12px;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
            margin: 4px 0 10px;
        }
        .detail-type.healthy {
            background: rgba(46, 204, 113, 0.3);
            color: #2ecc71;
        }
        .detail-type.harmful {
            background: rgba(231, 76, 60, 0.3);
            color: #e74c3c;
        }
        .btn-back {
            background: rgba(255, 255, 255, 0.07);
            border: 2px solid rgba(255, 255, 255, 0.18);
            color: #fff;
            padding: 11px 24px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>

            };

            const MAX_GLOWS = 2;

            function loadStorage() {
                try {
                    state.record = parseInt(localStorage.getItem('foodRun_record')) || 0;
                    const ls = localStorage.getItem('foodRun_lastScore');
                    state.lastScore = ls && ls !== 'null' ? parseInt(ls) : null;
                    const disc = localStorage.getItem('foodRun_collection');
                    if (disc) state.discoveredFoods = JSON.parse(disc);
                } catch (e) {
                    state.record = 0;
                    state.lastScore = null;
                    state.discoveredFoods = {};
                }
            }

            function saveStorage() {
                try {
                    localStorage.setItem('foodRun_record', state.record);
                    localStorage.setItem('foodRun_lastScore', state.lastScore);
                    localStorage.setItem('foodRun_collection', JSON.stringify(state.discoveredFoods));
                } catch (e) {}
            }

            function updateMenuStats() {
                recordVal.textContent = state.record;
                lastVal.textContent = state.lastScore !== null ? state.lastScore : '—';
            }

            function showScreen(name) {
                state.screen = name;
                [menuScreen, gameScreen, collectionScreen].forEach(s => s.classList.remove('active'));
                if (name === 'menu') menuScreen.classList.add('active');
                else if (name === 'game') gameScreen.classList.add('active');
                else if (name === 'collection') {
                    collectionScreen.classList.add('active');
                    renderCollection();
                    collectionDetail.style.display = 'none';
                    collectionGrid.style.display = 'grid';
                }
            }

            function renderCollection() {
                collectionGrid.innerHTML = '';
                const discovered = Object.keys(state.discoveredFoods);
                if (discovered.length === 0) {
                    collectionGrid.innerHTML = '<p style="color:#889;text-align:center;width:100%;padding:30px;">Пока ничего не открыто.</p>';
                    return;
                }
                discovered.forEach(foodId => {
                    const fd = FOOD_DATA.find(f => f.id === foodId);
                    if (!fd) return;
                    const card = document.createElement('div');
                    card.className = 'collection-card';
                    card.innerHTML = `
                        <span class="card-emoji">${fd.emoji}</span>
                        <span class="card-dot ${fd.type}"></span>
                        <span class="card-name">${fd.name}</span>
                    `;
                    card.addEventListener('click', () => showCollectionDetail(fd));
                    collectionGrid.appendChild(card);
                });
            }

            function showCollectionDetail(fd) {
                collectionGrid.style.display = 'none';
                collectionDetail.style.display = 'block';
                $('#detail-emoji').textContent = fd.emoji;
                $('#detail-name').textContent = fd.name;
                const typeEl = $('#detail-type');
                typeEl.textContent = fd.type === 'healthy' ? '✅ Полезная еда' : '🗑️ Вредная еда';
                typeEl.className = 'detail-type ' + fd.type;
                $('#detail-info').textContent = fd.info || '';
            }

            function updateHUD() {
                hudScore.textContent = '⭐ ' + state.score;
                hudTime.textContent = '⏱ ' + Math.floor(state.gameTime) + 's';
                const hearts = hudLives.querySelectorAll('.heart');
                hearts.forEach((h, i) => h.classList.toggle('lost', i >= state.lives));
            }

            function resizeCanvas() {
                const rect = app.getBoundingClientRect();
                const w = rect.width,
                    h = rect.height;
                state.canvasW = w;
                state.canvasH = h;
                canvas.width = w * (window.devicePixelRatio || 1);
                canvas.height = h * (window.devicePixelRatio || 1);
                canvas.style.width = w + 'px';
                canvas.style.height = h + 'px';
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1);
                state.roadTopY = h * 0.26;
                state.roadBottomY = h * 1.05; // продлеваем дорогу за нижний край экрана
                state.roadTopWidth = w * 0.3;
                state.roadBottomWidth = w * 0.9;
                state.laneWidthBottom = state.roadBottomWidth / 3;
                state.playerTargetX = w / 2 + state.lane * state.laneWidthBottom;
                state.playerX = state.playerTargetX;
            }

            function roadWidthAt(p) { return state.roadTopWidth + p * (state.roadBottomWidth - state.roadTopWidth); }
            function roadYAt(p) { return state.roadTopY + p * (state.roadBottomY - state.roadTopY); }
            function laneCenterX(lane, p) {
                const rw = roadWidthAt(p);
                return state.canvasW / 2 + lane * (rw / 3);
            }
            function scaleAt(p) { return 0.22 + p * 1.05; }

            function addBackgroundEffect(color, emoji) {
                while (state.bgGlows.length >= MAX_GLOWS) {
                    state.bgGlows.shift();
                }
                state.bgGlows.push({
                    x: state.canvasW / 2,
                    yBottom: state.canvasH,
                    height: state.canvasH * 0.55,
                    life: 0.9,
                    maxLife: 0.9,
                    color
                });
            }

            function spawnFood() {
                const fd = FOOD_DATA[Math.floor(Math.random() * FOOD_DATA.length)];
                const lane = Math.floor(Math.random() * 3) - 1;
                state.foods.push({ foodData: fd, lane, progress: -0.1, collected: false });
            }

            function resetGame() {
                state.gameRunning = true;
                state.gamePaused = false;
                state.score = 0;
                state.lives = 3;
                state.gameTime = 0;
                state.lane = 0;
                state.speed = state.baseSpeed;
                state.spawnInterval = 1.0;
                state.spawnTimer = 0;
                state.foods = [];
                state.bgGlows = [];
                state.roadMarkers = [];
                state.invincibleTimer = 0;
                state.shakeTimer = 0;
                state.shakeIntensity = 0;
                state.speedIncrementAcc = 0;
                state.markerSpawnTimer = 0;
                state.playerTargetX = state.canvasW / 2;
                state.playerX = state.playerTargetX;
                updateHUD();
                gameoverOverlay.classList.remove('visible');
                pauseOverlay.classList.remove('visible');
            }

            function endGame() {
                state.gameRunning = false;
                state.lastScore = state.score;
                if (state.score > state.record) state.record = state.score;
                saveStorage();
                updateMenuStats();
                const isRecord = state.score > 0 && state.score >= state.record;
                $('#go-score').textContent = state.score;
                $('#go-record').textContent = 'Рекорд: ' + state.record;
                const goTitle = $('#go-title'),
                    goRecord = $('#go-record');
                goTitle.textContent = isRecord ? '🏆 Новый рекорд!' : 'Игра окончена!';
                goTitle.classList.toggle('new-record', isRecord);
                goRecord.classList.toggle('new-record', isRecord);
                $('#go-emoji').textContent = isRecord ? '🏆' : '😢';
                gameoverOverlay.classList.add('visible');
            }

            let lastTime = 0;

            function update(dt) {
                if (!state.gameRunning || state.gamePaused) return;
                if (dt > 0.1) dt = 0.1;
                state.gameTime += dt;
                state.invincibleTimer = Math.max(0, state.invincibleTimer - dt);
                state.shakeTimer = Math.max(0, state.shakeTimer - dt);

                state.speedIncrementAcc += dt;
                if (state.speedIncrementAcc >= 7) {
                    state.speedIncrementAcc -= 7;
                    state.speed = Math.min(state.maxSpeed, state.speed + state.speedIncrement);
                    state.spawnInterval = Math.max(state.minSpawnInterval, state.spawnInterval - 0.05);
                }

                state.spawnTimer += dt;
                if (state.spawnTimer >= state.spawnInterval) {
                    state.spawnTimer = 0;
                    if (state.foods.length < 8) spawnFood();
                }

                state.markerSpawnTimer += dt;
                if (state.markerSpawnTimer >= 0.18) {
                    state.markerSpawnTimer = 0;
                    const lane = Math.floor(Math.random() * 3) - 1;
                    state.roadMarkers.push({ lane, progress: 0 });
                }
                for (let i = state.roadMarkers.length - 1; i >= 0; i--) {
                    state.roadMarkers[i].progress += state.speed * 2.0 * dt;
                    if (state.roadMarkers[i].progress >= 1) state.roadMarkers.splice(i, 1);
                }

                for (const f of state.foods) {
                    if (!f.collected) f.progress += state.speed * dt;
                }

                const playerP = state.playerProgress;
                for (const f of state.foods) {
                    if (f.collected) continue;
                    const threshold = f.foodData.type === 'healthy' ?
                        { low: -0.08, high: 0.10 } :
                        { low: -0.03, high: 0.05 };
                    if (f.progress >= playerP + threshold.low && f.progress <= playerP + threshold.high && f.lane === state.lane) {
                        if (f.foodData.type === 'healthy') {
                            state.score += Math.max(1, Math.floor(state.gameTime));
                            addBackgroundEffect('#2ecc71', f.foodData.emoji);
                            if (!state.discoveredFoods[f.foodData.id]) {
                                state.discoveredFoods[f.foodData.id] = true;
                                saveStorage();
                            }
                        } else {
                            if (state.invincibleTimer <= 0) {
                                state.lives--;
                                state.invincibleTimer = 0.8;
                                state.shakeTimer = 0.5;
                                state.shakeIntensity = 18;
                                addBackgroundEffect('#e74c3c', f.foodData.emoji);
                                if (!state.discoveredFoods[f.foodData.id]) {
                                    state.discoveredFoods[f.foodData.id] = true;
                                    saveStorage();
                                }
                            }
                        }
                        f.collected = true;
                    }
                }

                state.foods = state.foods.filter(f => !f.collected && f.progress <= 1.15);

                for (const g of state.bgGlows) g.life -= dt;
                state.bgGlows = state.bgGlows.filter(g => g.life > 0);

                const dx = state.playerTargetX - state.playerX;
                const lerpFactor = 1 - Math.exp(-16 * dt);
                state.playerX += dx * lerpFactor;
                if (Math.abs(dx) < 0.15) state.playerX = state.playerTargetX;

                if (state.lives <= 0 && state.gameRunning) endGame();
            }

            function drawRoad() {
                const w = state.canvasW,
                    h = state.canvasH;
                const rty = state.roadTopY,
                    rby = state.roadBottomY;
                const rtw = state.roadTopWidth,
                    rbw = state.roadBottomWidth;

                const skyGrad = ctx.createLinearGradient(0, 0, 0, h);
                skyGrad.addColorStop(0, '#0a0a24');
                skyGrad.addColorStop(1, '#151530');
                ctx.fillStyle = skyGrad;
                ctx.fillRect(0, 0, w, h);

                for (const g of state.bgGlows) {
                    const progress = g.life / g.maxLife;
                    const alpha = progress * 0.45;
                    const grad = ctx.createLinearGradient(0, g.yBottom - g.height, 0, g.yBottom);
                    let rgba;
                    if (g.color === '#2ecc71') rgba = `rgba(46,204,113,${alpha})`;
                    else if (g.color === '#e74c3c') rgba = `rgba(231,76,60,${alpha})`;
                    else rgba = g.color.replace(')', `,${alpha})`).replace('rgb', 'rgba');
                    grad.addColorStop(0, 'rgba(0,0,0,0)');
                    grad.addColorStop(1, rgba);
                    ctx.fillStyle = grad;
                    ctx.fillRect(0, g.yBottom - g.height, w, g.height);
                }

                const leftTop = w / 2 - rtw / 2,
                    rightTop = w / 2 + rtw / 2;
                const leftBottom = w / 2 - rbw / 2,
                    rightBottom = w / 2 + rbw / 2;

                ctx.fillStyle = '#14142b';
                ctx.beginPath();
                ctx.moveTo(leftTop, rty);
                ctx.lineTo(rightTop, rty);
                ctx.lineTo(rightBottom, rby);
                ctx.lineTo(leftBottom, rby);
                ctx.closePath();
                ctx.fill();

                for (const m of state.roadMarkers) {
                    const p = m.progress;
                    if (p < 0 || p > 1) continue;
                    const cx = laneCenterX(m.lane, p);
                    const cy = roadYAt(p);
                    const sc = scaleAt(p);
                    const ww = 4 * sc;
                    const hh = 18 * sc;
                    ctx.fillStyle = 'rgba(255,255,255,0.7)';
                    ctx.fillRect(cx - ww / 2, cy - hh / 2, ww, hh);
                }

                ctx.save();
                ctx.shadowBlur = 4;
                ctx.shadowColor = 'rgba(0, 200, 255, 0.2)';
                ctx.strokeStyle = 'rgba(0, 200, 255, 0.25)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(leftTop, rty);
                ctx.lineTo(leftBottom, rby);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(rightTop, rty);
                ctx.lineTo(rightBottom, rby);
                ctx.stroke();

                ctx.shadowColor = 'rgba(255, 200, 255, 0.2)';
                ctx.strokeStyle = 'rgba(255, 200, 255, 0.25)';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(w / 2 - rtw / 6, rty);
                ctx.lineTo(w / 2 - rbw / 6, rby);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(w / 2 + rtw / 6, rty);
                ctx.lineTo(w / 2 + rbw / 6, rby);
                ctx.stroke();
                ctx.restore();
            }

            function drawFoodItems() {
                for (const f of state.foods) {
                    if (f.collected) continue;
                    const p = f.progress;
                    if (p < -0.05 || p > 1.15) continue;
                    const cx = laneCenterX(f.lane, p);
                    const cy = roadYAt(p);
                    const scale = scaleAt(p);
                    const size = 48 * scale;
                    const half = size / 2;
                    const circleRadius = half * 1.35;
                    const fd = f.foodData;
                    const borderColor = fd.type === 'healthy' ? '#2ecc71' : '#e74c3c';

                    ctx.fillStyle = 'rgba(0,0,0,0.35)';
                    ctx.beginPath();
                    ctx.ellipse(cx, cy + size * 0.25, half * 0.8, half * 0.2, 0, 0, Math.PI * 2);
                    ctx.fill();

                    const glow = ctx.createRadialGradient(cx, cy, half * 0.6, cx, cy, circleRadius * 1.4);
                    glow.addColorStop(0, borderColor.replace(')', ',0.3)').replace('rgb', 'rgba'));
                    glow.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = glow;
                    ctx.beginPath();
                    ctx.arc(cx, cy, circleRadius * 1.4, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.strokeStyle = borderColor;
                    ctx.lineWidth = 2.5 * scale;
                    ctx.beginPath();
                    ctx.arc(cx, cy, circleRadius, 0, Math.PI * 2);
                    ctx.stroke();

                    ctx.font = `${size * 0.9}px 'Segoe UI Emoji','Apple Color Emoji'`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(fd.emoji, cx, cy);
                }
            }

            function drawPlayer() {
                const px = state.playerX;
                const py = roadYAt(state.playerProgress);
                const scale = scaleAt(state.playerProgress);
                const size = 58 * scale;
                const half = size / 2;
                const circleRadius = half * 1.2;

                if (state.invincibleTimer > 0 && Math.floor(state.invincibleTimer * 15) % 2 === 0) {
                    ctx.fillStyle = 'rgba(255,255,255,0.35)';
                    ctx.beginPath();
                    ctx.arc(px, py, circleRadius * 1.4, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.fillStyle = 'rgba(0,0,0,0.4)';
                ctx.beginPath();
                ctx.ellipse(px, py + size * 0.25, half * 0.75, half * 0.2, 0, 0, Math.PI * 2);
                ctx.fill();

                const glow = ctx.createRadialGradient(px, py, half * 0.6, px, py, circleRadius * 1.5);
                glow.addColorStop(0, 'rgba(241,196,15,0.25)');
                glow.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = glow;
                ctx.beginPath();
                ctx.arc(px, py, circleRadius * 1.5, 0, Math.PI * 2);
                ctx.fill();

                ctx.strokeStyle = '#f1c40f';
                ctx.lineWidth = 3 * scale;
                ctx.beginPath();
                ctx.arc(px, py, circleRadius, 0, Math.PI * 2);
                ctx.stroke();

                ctx.font = `${size * 1.1}px 'Segoe UI Emoji','Apple Color Emoji'`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('🏃', px, py);
            }

            function drawFog() {
                const rty = state.roadTopY;
                const rby = state.roadBottomY;
                // Верхний туман
                const fogTop = rty - 100;
                const fogBottom = rty + 150;
                const fog = ctx.createLinearGradient(0, fogTop, 0, fogBottom);
                fog.addColorStop(0, '#0a0a24');
                fog.addColorStop(0.4, 'rgba(10,10,36,0.94)');
                fog.addColorStop(1, 'rgba(10,10,36,0)');
                ctx.fillStyle = fog;
                ctx.fillRect(0, fogTop, state.canvasW, fogBottom - fogTop);

                // Нижний туман (скрывает край дороги и уходящие продукты)
                const bottomFogTop = rby - 80;
                const bottomFogBottom = state.canvasH;
                const bottomFog = ctx.createLinearGradient(0, bottomFogTop, 0, bottomFogBottom);
                bottomFog.addColorStop(0, 'rgba(10,10,36,0)');
                bottomFog.addColorStop(0.5, 'rgba(10,10,36,0.85)');
                bottomFog.addColorStop(1, '#0a0a24');
                ctx.fillStyle = bottomFog;
                ctx.fillRect(0, bottomFogTop, state.canvasW, bottomFogBottom - bottomFogTop);
            }

            function render() {
                ctx.clearRect(0, 0, state.canvasW, state.canvasH);
                let sx = 0,
                    sy = 0;
                if (state.shakeTimer > 0) {
                    const i = state.shakeIntensity * (state.shakeTimer / 0.5);
                    sx = (Math.random() - 0.5) * i * 2;
                    sy = (Math.random() - 0.5) * i * 2;
                }
                ctx.save();
                ctx.translate(sx, sy);
                drawRoad();
                drawFoodItems();
                drawPlayer();
                drawFog();
                ctx.restore();
            }

            function gameLoop(timestamp) {
                if (!lastTime) lastTime = timestamp;
                const dt = Math.min(0.1, (timestamp - lastTime) / 1000);
                lastTime = timestamp;
                if (state.screen === 'game') {
                    update(dt);
                    render();
                    updateHUD();
                }
                requestAnimationFrame(gameLoop);
            }

            function moveLane(delta) {
                if (!state.gameRunning || state.gamePaused) return;
                const newLane = Math.max(-1, Math.min(1, state.lane + delta));
                if (newLane !== state.lane) {
                    state.lane = newLane;
                    state.playerTargetX = state.canvasW / 2 + state.lane * state.laneWidthBottom;
                }
            }

            let touchStartX = 0,
                touchStartY = 0,
                touchActive = false;
            canvas.addEventListener('touchstart', e => {
                if (!state.gameRunning || state.gamePaused) return;
                if (e.touches.length === 1) {
                    touchStartX = e.touches[0].clientX;
                    touchStartY = e.touches[0].clientY;
                    touchActive = true;
                }
            }, { passive: false });
            canvas.addEventListener('touchmove', e => {
                if (touchActive && state.gameRunning && !state.gamePaused) e.preventDefault();
            }, { passive: false });
            canvas.addEventListener('touchend', e => {
                if (!touchActive) return;
                touchActive = false;
                if (!state.gameRunning || state.gamePaused) return;
                const dx = (e.changedTouches[0]?.clientX || touchStartX) - touchStartX;
                const dy = (e.changedTouches[0]?.clientY || touchStartY) - touchStartY;
                if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 25) moveLane(dx > 0 ? 1 : -1);
            });
            canvas.addEventListener('mousedown', e => {
                if (!state.gameRunning || state.gamePaused) return;
                touchStartX = e.clientX;
                touchStartY = e.clientY;
                touchActive = true;
            });
            window.addEventListener('mouseup', e => {
                if (!touchActive) return;
                touchActive = false;
                if (!state.gameRunning || state.gamePaused) return;
                const dx = e.clientX - touchStartX,
                    dy = e.clientY - touchStartY;
                if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 20) moveLane(dx > 0 ? 1 : -1);
            });
            window.addEventListener('keydown', e => {
                if (state.screen !== 'game' || !state.gameRunning || state.gamePaused) return;
                if (e.key === 'ArrowLeft' || e.key === 'a') { e.preventDefault();
                    moveLane(-1); } else if (e.key === 'ArrowRight' || e.key === 'd') { e.preventDefault();
                    moveLane(1); }
            });

            $('#btn-play').addEventListener('click', () => { resizeCanvas();
                resetGame();
                showScreen('game');
                lastTime = performance.now(); });
            $('#hud-pause-btn').addEventListener('click', () => { if (state.gameRunning && !state.gamePaused) { state
                    .gamePaused = true;
                pauseOverlay.classList.add('visible'); } });
            $('#pause-resume').addEventListener('click', () => { state.gamePaused = false;
                pauseOverlay.classList.remove('visible');
                lastTime = performance.now(); });
            $('#pause-quit').addEventListener('click', () => { state.gameRunning = false;
                state.lastScore = state.score; if (state.score > state.record) state.record = state.score;
                saveStorage();
                updateMenuStats();
                pauseOverlay.classList.remove('visible');
                showScreen('menu'); });
            $('#go-retry').addEventListener('click', () => { resizeCanvas();
                resetGame();
                showScreen('game');
                lastTime = performance.now(); });
            $('#go-menu').addEventListener('click', () => { state.gameRunning = false;
                gameoverOverlay.classList.remove('visible');
                showScreen('menu'); });
            $('#btn-collection-menu').addEventListener('click', () => showScreen('collection'));
            $('#btn-collection-back').addEventListener('click', () => showScreen('menu'));
            $('#btn-detail-back').addEventListener('click', () => { collectionDetail.style.display = 'none';
                collectionGrid.style.display = 'grid'; });

            window.addEventListener('resize', () => { resizeCanvas();
                state.playerTargetX = state.canvasW / 2 + state.lane * state.laneWidthBottom;
                state.playerX = state.playerTargetX; });

            function init() { loadStorage();
                updateMenuStats();
                resizeCanvas();
                showScreen('menu');
                requestAnimationFrame(gameLoop); }
            document.readyState === 'loading' ? document.addEventListener('DOMContentLoaded', init) : init();
        })();
    </script>
</body>
</html>
